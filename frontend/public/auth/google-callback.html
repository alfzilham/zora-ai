<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Authenticating...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #F5F5F5;
      font-family: 'Sora', sans-serif;
      color: #111111;
    }

    .msg {
      font-size: 14px;
      color: #555555;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500&display=swap" rel="stylesheet" />
</head>

<body>
  <p class="msg">Completing sign-in...</p>

  <script>
    (function () {
      // Parse the URL hash that Google appends after redirect
      // e.g. #access_token=ya29.xxx&token_type=Bearer&...
      const hash = window.location.hash.substring(1);
      const params = hash
        ? Object.fromEntries(new URLSearchParams(hash).entries())
        : {};

      if (params.access_token) {
        // Send token to parent window (login.html or signup.html)
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(
            { type: 'GOOGLE_AUTH_SUCCESS', token: params.access_token },
            window.location.origin
          );
        }
      } else if (params.error) {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(
            { type: 'GOOGLE_AUTH_ERROR', error: params.error },
            window.location.origin
          );
        }
      }

      // Close popup after a short delay
      setTimeout(() => window.close(), 300);
    })();
  </script>
</body>

</html>
