    <meta property="og:description" content="SuperIntelligence Autonomous AI">

    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.ico">

    <title>Sign Up - ZORA AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #F5F5F5;
            --white: #FFFFFF;
            --text-primary: #111111;
            --text-secondary: #555555;
            --text-muted: #999999;
            --accent: #0099CC;
            --accent-hover: #007AA8;
            --border: #E5E5E5;
            --hover: #F0F0F0;
            --error: #E53E3E;
            --font: 'Sora', sans-serif;
        }

        html,
        body {
            height: 100vh;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-y: hidden !important;
        }

        /* ── Layout ── */
        .auth-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        /* ── Visual Panel (Left) ── */
        .visual-panel {
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            gap: 36px;
        }

        .visual-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 153, 204, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 153, 204, 0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        .visual-panel::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 153, 204, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── Orb ── */
        .zora-orb {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: orbFloat 3s ease-in-out infinite;
            cursor: default;
            position: relative;
            overflow: visible;
            background: transparent;
            z-index: 1;
        }

        .orb-canvas-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            z-index: 0;
            filter: drop-shadow(0 0 28px rgba(120, 100, 255, 0.22)) drop-shadow(0 0 60px rgba(100, 180, 255, 0.12));
        }

        .orb-canvas-container canvas {
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            background: transparent !important;
        }

        .orb-eyes {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .orb-eye {
            width: 12px;
            height: 44px;
            background: #252525;
            border-radius: 6px;
            display: block;
            transition: transform 0.08s ease-out;
        }

        .orb-eye.blinking {
            animation: eyeBlink 0.3s ease-in-out;
        }

        @keyframes eyeBlink {
            0% {
                transform: scaleY(1);
            }

            40% {
                transform: scaleY(0.05);
            }

            100% {
                transform: scaleY(1);
            }
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-14px);
            }
        }

        /* ── Visual Branding ── */
        .visual-brand {
            text-align: center;
            z-index: 1;
        }

        .visual-brand-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }

        .visual-brand-sub {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
            max-width: 240px;
            line-height: 1.6;
        }

        .visual-brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 153, 204, 0.08);
            border: 1px solid rgba(0, 153, 204, 0.2);
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 99px;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ── Form Panel (Right) ── */
        .form-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 48px 64px;
            background: var(--white);
            position: relative;
            z-index: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .form-panel::-webkit-scrollbar {
            display: none;
        }

        .form-inner {
            width: 100%;
            max-width: 400px;
        }

        .form-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .form-logo img {
            height: 36px;
            width: auto;
        }

        .form-logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .form-heading {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .form-subheading {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-weight: 400;
        }

        /* ── Form Fields ── */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 7px;
            letter-spacing: 0.1px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: var(--font);
            font-size: 14px;
            color: var(--text-primary);
            background: var(--bg);
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            border-color: var(--accent);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(0, 153, 204, 0.10);
        }

        /* ── Error ── */
        .error-message {
            font-size: 13px;
            color: var(--error);
            min-height: 16px;
            margin-bottom: 14px;
            font-weight: 500;
        }

        /* ── Buttons ── */
        .btn {
            width: 100%;
            padding: 13px 20px;
            border: none;
            border-radius: 10px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.18s ease;
            letter-spacing: 0.1px;
        }

        .btn-primary {
            background: var(--accent);
            color: #FFFFFF;
            margin-bottom: 14px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 153, 204, 0.28);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-google {
            background: var(--white);
            color: var(--text-primary);
            border: 1.5px solid var(--border);
        }

        .btn-google:hover {
            background: var(--hover);
            border-color: #CCCCCC;
        }

        .google-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* ── Divider ── */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
        }

        /* ── Footer Link ── */
        .auth-footer {
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }

        .auth-link {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.15s;
        }

        .auth-link:hover {
            color: var(--accent-hover);
        }

        .hidden {
            display: none;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .auth-layout {
                grid-template-columns: 1fr;
            }

            .visual-panel {
                display: none;
            }

            .form-panel {
                padding: 40px 28px;
            }
        }

        /* ── Checkbox Terms ── */
        .terms-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.18s;
        }

        .terms-row:hover {
            border-color: var(--accent);
        }

        .terms-checkbox {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }

        .terms-label {
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            line-height: 1.4;
        }

        .terms-label a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }

        .terms-label a:hover {
            color: var(--accent-hover);
        }

        /* ── Phone Section ── */
        .phone-section {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.25s ease, margin 0.3s ease;
        }

        .phone-section.open {
            max-height: 200px;
            opacity: 1;
            margin-bottom: 4px;
        }

        .phone-input-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .phone-input-row .form-input {
            flex: 1;
        }

        .btn-send {
            padding: 12px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.18s ease;
            flex-shrink: 0;
        }

        .btn-send:hover {
            background: var(--accent-hover);
        }

        .btn-send:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* ── OTP Section ── */
        .otp-section {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.25s ease;
        }

        .otp-section.open {
            max-height: 160px;
            opacity: 1;
        }

        .otp-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .otp-inputs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .otp-digit {
            width: 44px;
            height: 48px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            text-align: center;
            font-family: var(--font);
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            background: var(--bg);
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .otp-digit:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 153, 204, 0.10);
            background: var(--white);
        }

        /* ── SSO Buttons ── */
        .sso-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-sso {
            background: var(--white);
            color: var(--text-primary);
            border: 1.5px solid var(--border);
        }

        .btn-sso:hover {
            background: var(--hover);
            border-color: #ccc;
        }

        /* ── Locked state ── */
        .sso-stack.locked .btn,
        .sso-stack.locked .btn-sso,
        .email-block.locked,
        .phone-block.locked {
            opacity: 0.4;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>

    <script>
        // ── Orb Behavior ──────────────────────────────────────
        function bindOrbBehavior() {
            const orb = document.getElementById('zoraOrb');
            const container = document.getElementById('orbCanvas');
            if (!orb || !container) return;

            document.addEventListener('mousemove', (e) => {
                const rect = orb.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const angle = Math.atan2(e.clientY - cy, e.clientX - cx);
                const dist = Math.min(28, Math.hypot(e.clientX - cx, e.clientY - cy) / 8);
                document.querySelectorAll('.orb-eye').forEach((eye) => {
                    eye.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
                });
            });

            document.addEventListener('mouseleave', () => {
                document.querySelectorAll('.orb-eye').forEach((eye) => {
                    eye.style.transform = 'translate(0px, 0px)';
                });
            });

            setInterval(() => {
                document.querySelectorAll('.orb-eye').forEach((eye) => {
                    eye.classList.add('blinking');
                    setTimeout(() => eye.classList.remove('blinking'), 300);
                });
            }, 6000);

            initWebGLOrb(container);
        }

        async function initWebGLOrb(container) {
            try {
                const { Renderer, Program, Mesh, Triangle, Vec3 } =
                    await import('https://cdn.jsdelivr.net/npm/ogl@1.0.9/src/index.js');

                const renderer = new Renderer({ alpha: true, premultipliedAlpha: false });
                const gl = renderer.gl;
                gl.clearColor(0, 0, 0, 0);
                container.appendChild(gl.canvas);

                const vert = `
                    precision highp float;
                    attribute vec2 position;
                    attribute vec2 uv;
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = vec4(position, 0.0, 1.0);
                    }
                `;

                const frag = `
                    precision highp float;
                    uniform float iTime;
                    uniform vec3 iResolution;
                    uniform float hue;
                    uniform float hover;
                    uniform float rot;
                    uniform float hoverIntensity;
                    uniform vec3 backgroundColor;
                    varying vec2 vUv;

                    vec3 rgb2yiq(vec3 c) {
                        return vec3(dot(c,vec3(0.299,0.587,0.114)),dot(c,vec3(0.596,-0.274,-0.322)),dot(c,vec3(0.211,-0.523,0.312)));
                    }
                    vec3 yiq2rgb(vec3 c) {
                        return vec3(c.x+0.956*c.y+0.621*c.z,c.x-0.272*c.y-0.647*c.z,c.x-1.106*c.y+1.703*c.z);
                    }
                    vec3 adjustHue(vec3 color, float hueDeg) {
                        float hueRad=hueDeg*3.14159265/180.0;
                        vec3 yiq=rgb2yiq(color);
                        float cosA=cos(hueRad); float sinA=sin(hueRad);
                        yiq.y=yiq.y*cosA-yiq.z*sinA;
                        yiq.z=yiq.y*sinA+yiq.z*cosA;
                        return yiq2rgb(yiq);
                    }
                    vec3 hash33(vec3 p3) {
                        p3=fract(p3*vec3(0.1031,0.11369,0.13787));
                        p3+=dot(p3,p3.yxz+19.19);
                        return -1.0+2.0*fract(vec3(p3.x+p3.y,p3.x+p3.z,p3.y+p3.z)*p3.zyx);
                    }
                    float snoise3(vec3 p) {
                        const float K1=0.333333333; const float K2=0.166666667;
                        vec3 i=floor(p+(p.x+p.y+p.z)*K1);
                        vec3 d0=p-(i-(i.x+i.y+i.z)*K2);
                        vec3 e=step(vec3(0.0),d0-d0.yzx);
                        vec3 i1=e*(1.0-e.zxy); vec3 i2=1.0-e.zxy*(1.0-e);
                        vec3 d1=d0-(i1-K2); vec3 d2=d0-(i2-K1); vec3 d3=d0-0.5;
                        vec4 h=max(0.6-vec4(dot(d0,d0),dot(d1,d1),dot(d2,d2),dot(d3,d3)),0.0);
                        vec4 n=h*h*h*h*vec4(dot(d0,hash33(i)),dot(d1,hash33(i+i1)),dot(d2,hash33(i+i2)),dot(d3,hash33(i+1.0)));
                        return dot(vec4(31.316),n);
                    }
                    vec4 extractAlpha(vec3 colorIn) {
                        float a=max(max(colorIn.r,colorIn.g),colorIn.b);
                        return vec4(colorIn.rgb/(a+1e-5),a);
                    }
                    const vec3 baseColor1=vec3(0.611765,0.262745,0.996078);
                    const vec3 baseColor2=vec3(0.298039,0.760784,0.913725);
                    const vec3 baseColor3=vec3(0.062745,0.078431,0.600000);
                    const float innerRadius=0.6;
                    const float noiseScale=0.65;
                    float light1(float i,float a,float d){return i/(1.0+d*a);}
                    float light2(float i,float a,float d){return i/(1.0+d*d*a);}
                    vec4 draw(vec2 uv) {
                        vec3 color1=adjustHue(baseColor1,hue);
                        vec3 color2=adjustHue(baseColor2,hue);
                        vec3 color3=adjustHue(baseColor3,hue);
                        float ang=atan(uv.y,uv.x); float len=length(uv);
                        float invLen=len>0.0?1.0/len:0.0;
                        float bgLum=dot(backgroundColor,vec3(0.299,0.587,0.114));
                        float n0=snoise3(vec3(uv*noiseScale,iTime*0.5))*0.5+0.5;
                        float r0=mix(mix(innerRadius,1.0,0.4),mix(innerRadius,1.0,0.6),n0);
                        float d0=distance(uv,(r0*invLen)*uv);
                        float v0=light1(1.0,10.0,d0);
                        v0*=smoothstep(r0*1.05,r0,len);
                        float innerFade=smoothstep(r0*0.8,r0*0.95,len);
                        v0*=mix(innerFade,1.0,bgLum*0.7);
                        float cl=cos(ang+iTime*2.0)*0.5+0.5;
                        float a=iTime*-1.0;
                        vec2 pos=vec2(cos(a),sin(a))*r0;
                        float d=distance(uv,pos);
                        float v1=light2(1.5,5.0,d)*light1(1.0,50.0,d0);
                        float v2=smoothstep(1.0,mix(innerRadius,1.0,n0*0.5),len);
                        float v3=smoothstep(innerRadius,mix(innerRadius,1.0,0.5),len);
                        vec3 colBase=mix(color1,color2,cl);
                        float fadeAmount=mix(1.0,0.1,bgLum);
                        vec3 darkCol=clamp((mix(color3,colBase,v0)+v1)*v2*v3,0.0,1.0);
                        vec3 lightCol=clamp(mix(backgroundColor,colBase+v1,v0)*mix(1.0,v2*v3,fadeAmount),0.0,1.0);
                        return extractAlpha(mix(darkCol,lightCol,bgLum));
                    }
                    void main() {
                        vec2 center=iResolution.xy*0.5;
                        float size=min(iResolution.x,iResolution.y);
                        vec2 uv=(vUv*iResolution.xy-center)/size*2.0;
                        float s=sin(rot); float c=cos(rot);
                        uv=vec2(c*uv.x-s*uv.y,s*uv.x+c*uv.y);
                        uv.x+=hover*hoverIntensity*0.1*sin(uv.y*10.0+iTime);
                        uv.y+=hover*hoverIntensity*0.1*sin(uv.x*10.0+iTime);
                        vec4 col=draw(uv);
                        gl_FragColor=vec4(col.rgb*col.a,col.a);
                    }
                `;

                const geometry = new Triangle(gl);
                const program = new Program(gl, {
                    vertex: vert,
                    fragment: frag,
                    uniforms: {
                        iTime: { value: 0 },
                        iResolution: { value: new Vec3(320, 320, 1) },
                        hue: { value: 0 },
                        hover: { value: 0 },
                        rot: { value: 0 },
                        hoverIntensity: { value: 0.2 },
                        // backgroundColor: { value: new Vec3(0.961, 0.961, 0.961) },
                    }
                });

                const mesh = new Mesh(gl, { geometry, program });

                function resize() {
                    const dpr = window.devicePixelRatio || 1;
                    const w = container.clientWidth;
                    const h = container.clientHeight;
                    renderer.setSize(w * dpr, h * dpr);
                    gl.canvas.style.width = w + 'px';
                    gl.canvas.style.height = h + 'px';
                    program.uniforms.iResolution.value.set(gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height);
                }
                window.addEventListener('resize', resize);
                resize();

                let targetHover = 0;
                let currentRot = 0;
                let lastTime = 0;

                container.addEventListener('mousemove', (e) => {
                    const rect = container.getBoundingClientRect();
                    const uvX = ((e.clientX - rect.left - rect.width / 2) / Math.min(rect.width, rect.height)) * 2;
                    const uvY = ((e.clientY - rect.top - rect.height / 2) / Math.min(rect.width, rect.height)) * 2;
                    targetHover = Math.hypot(uvX, uvY) < 0.8 ? 1 : 0;
                });
                container.addEventListener('mouseleave', () => { targetHover = 0; });

                (function loop(t) {
                    requestAnimationFrame(loop);
                    const dt = (t - lastTime) * 0.001;
                    lastTime = t;
                    program.uniforms.iTime.value = t * 0.001;
                    program.uniforms.hover.value += (targetHover - program.uniforms.hover.value) * 0.1;
                    if (targetHover > 0.5) currentRot += dt * 0.3;
                    program.uniforms.rot.value = currentRot;
                    renderer.render({ scene: mesh });
                })(0);

            } catch (err) {
                console.warn('WebGL Orb failed:', err);
            }
        }

        function bindOtpInputs(container, onComplete) {
            const digits = container.querySelectorAll('.otp-digit');
            digits.forEach((input, i) => {
                input.addEventListener('input', () => {
                    input.value = input.value.replace(/\D/g, '').slice(0, 1);
                    if (input.value && i < digits.length - 1) digits[i + 1].focus();
                    const code = [...digits].map(d => d.value).join('');
                    if (code.length === 6) onComplete(code);
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && i > 0) digits[i - 1].focus();
                });
            });
        }

        function showError(msg) {
            document.getElementById('errorMessage').textContent = msg;
        }

        // ── Init ──────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthStatus();
            bindOrbBehavior();

            // Terms checkbox — unlock semua
            const termsCheckbox = document.getElementById('termsCheckbox');
            const emailBlock = document.querySelector('.email-block');
            const phoneBlock = document.querySelector('.phone-block');
            const ssoStack = document.querySelector('.sso-stack');

            termsCheckbox.addEventListener('change', () => {
                const locked = !termsCheckbox.checked;
                emailBlock.classList.toggle('locked', locked);
                phoneBlock.classList.toggle('locked', locked);
                ssoStack.classList.toggle('locked', locked);
            });

            // Email OTP
            const emailInput = document.getElementById('emailInput');
            const emailOtpSection = document.getElementById('emailOtpSection');
            const emailOtpHint = document.getElementById('emailOtpHint');

            document.getElementById('emailContinueBtn').addEventListener('click', async () => {
                const email = emailInput.value.trim();
                if (!email) { showError('Please enter your email.'); return; }
                showError('');
                try {
                    await handleEmailOtp(email);
                    emailOtpHint.textContent = `OTP sent to ${email}`;
                    emailOtpSection.classList.add('open');
                    emailOtpSection.querySelector('.otp-digit').focus();
                } catch (e) { showError(e.message || 'Failed to send OTP.'); }
            });

            bindOtpInputs(document.getElementById('emailOtpInputs'), (code) => {
                document.getElementById('emailVerifyBtn').dataset.code = code;
            });

            document.getElementById('emailVerifyBtn').addEventListener('click', async (e) => {
                const code = e.currentTarget.dataset.code || '';
                const email = emailInput.value.trim();
                if (code.length < 6) { showError('Enter the 6-digit code.'); return; }
                try {
                    await handleVerifyEmailOtp(email, code);
                } catch (err) { showError(err.message || 'Invalid OTP.'); }
            });

            // Phone OTP
            const phoneSection = document.getElementById('phoneSection');
            const phoneOtpSection = document.getElementById('phoneOtpSection');
            const phoneOtpHint = document.getElementById('phoneOtpHint');
            const phoneInput = document.getElementById('phoneInput');

            document.getElementById('phoneToggleBtn').addEventListener('click', () => {
                phoneSection.classList.toggle('open');
            });

            document.getElementById('phoneSendBtn').addEventListener('click', async () => {
                const phone = phoneInput.value.trim();
                if (!phone) { showError('Please enter your phone number.'); return; }
                showError('');
                try {
                    await handlePhoneOtp(phone);
                    phoneOtpHint.textContent = `OTP sent to ${phone}`;
                    phoneOtpSection.classList.add('open');
                    phoneOtpSection.querySelector('.otp-digit').focus();
                } catch (e) { showError(e.message || 'Failed to send OTP.'); }
            });

            bindOtpInputs(document.getElementById('phoneOtpInputs'), (code) => {
                document.getElementById('phoneVerifyBtn').dataset.code = code;
            });

            document.getElementById('phoneVerifyBtn').addEventListener('click', async (e) => {
                const code = e.currentTarget.dataset.code || '';
                const phone = phoneInput.value.trim();
                if (code.length < 6) { showError('Enter the 6-digit code.'); return; }
                try {
                    await handleVerifyPhoneOtp(phone, code);
                } catch (err) { showError(err.message || 'Invalid OTP.'); }
            });

            // SSO
            document.getElementById('githubBtn').addEventListener('click', () => handleGithubAuth());
            document.getElementById('googleBtn').addEventListener('click', () => handleGoogleAuth());
        });
    </script>
