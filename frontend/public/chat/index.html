<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZORA AI SuperIntelligence Autonomous AI">
    <meta name="theme-color" content="#00D4FF">
    <meta property="og:title" content="ZORA AI">
    <meta property="og:description" content="SuperIntelligence Autonomous AI">
    <meta property="og:image" content="/assets/images/logo/logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <title>ZORA Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/chat.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script defer src="/js/utils/helpers.js"></script>
    <script defer src="/js/utils/api.js"></script>
    <script defer src="/js/chat.js"></script>
</head>
<body>
    <div class="chat-shell" id="chatShell">
        <aside class="chat-sidebar sidebar" id="sidebar">
            <div class="sidebar-content">
                <div class="sidebar-header">
                    <div class="sidebar-brand sidebar-logo">
                        <img src="/assets/images/logo/logo.png" class="sidebar-logo-icon" alt="ZORA AI logo" loading="lazy">
                        <span class="sidebar-logo-text sidebar-brand-name">ZORA AI</span>
                    </div>
                    <button id="sidebar-toggle" class="sidebar-toggle-btn" type="button" title="Toggle Sidebar">
                        <i class="fi fi-br-sidebar"></i>
                    </button>
                </div>

                <label class="sidebar-search search-bar">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M10.5 4a6.5 6.5 0 1 0 4.09 11.55l4.43 4.43 1.41-1.41L16 14.14A6.5 6.5 0 0 0 10.5 4Zm0 2a4.5 4.5 0 1 1 0 9a4.5 4.5 0 0 1 0-9Z"></path>
                    </svg>
                    <input id="historySearch" type="search" placeholder="Search chats...">
                </label>

                <nav class="sidebar-nav" aria-label="Primary">
                    <a class="sidebar-link nav-item active" href="#" title="Home">
                        <span class="nav-icon"><i class="fi fi-br-house-chimney"></i></span>
                        <span class="nav-label">Home</span>
                    </a>
                    <a class="sidebar-link nav-item" href="#" title="History">
                        <span class="nav-icon"><i class="fi fi-br-pending"></i></span>
                        <span class="nav-label">History</span>
                    </a>
                    <a class="sidebar-link nav-item" href="/labs/code.html" title="Code">
                        <span class="nav-icon"><i class="fi fi-br-terminal"></i></span>
                        <span class="nav-label">Code</span>
                    </a>
                    <a class="sidebar-link nav-item" href="/labs/research.html" title="Labs">
                        <span class="nav-icon"><i class="fi fi-br-flask"></i></span>
                        <span class="nav-label">Labs</span>
                    </a>
                    <a class="sidebar-link nav-item" href="/settings/index.html" title="FeedBack">
                        <span class="nav-icon"><i class="fi fi-br-feedback-review"></i></span>
                        <span class="nav-label">FeedBack</span>
                    </a>
                </nav>

                <div class="sidebar-divider"></div>

                <section class="sidebar-history chat-history-section">
                    <h2>Chat History</h2>
                    <div id="historyScroll" class="history-scroll">
                        <div id="conversationList"></div>
                    </div>
                </section>

                <div class="sidebar-divider"></div>

                <div class="user-profile-section">
                    <div id="settings-dropdown" class="settings-dropdown">
                        <div id="settingsDropdownEmail" class="settings-dropdown-email"></div>
                        <div class="settings-divider"></div>
                        <div class="settings-action-btn logout-btn" id="logout-button">
                            <i class="fi fi-br-sign-out-alt"></i>
                            <span>Log out</span>
                        </div>
                    </div>

                    <div class="sidebar-user">
                        <div id="profileAvatar" class="sidebar-user-avatar">Z</div>
                        <div class="sidebar-user-info">
                            <p id="profileName" class="sidebar-user-name">Loading...</p>
                            <p id="profileEmail" class="sidebar-user-email"></p>
                        </div>
                        <button id="settings-gear" class="sidebar-settings-link" type="button" aria-label="Open settings">
                            <i class="fi fi-br-settings"></i>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="chat-main">
            <header class="chat-topbar">
                <button id="chatTitleButton" class="chat-title-button" type="button">
                    <span id="chatTitle">Chat Title</span>
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7.41 8.59 12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41Z"></path>
                    </svg>
                </button>

                <div class="topbar-actions">
                    <button id="incognitoButton" class="topbar-icon-button" type="button" aria-label="Incognito mode">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 4c2.62 0 4.85 1.67 5.67 4H22v2h-1.16l-1.09 8.14A2 2 0 0 1 17.77 20H6.23a2 2 0 0 1-1.98-1.86L3.16 10H2V8h4.33A5.99 5.99 0 0 1 12 4Zm5.75 6H6.25l.98 7.36a.5.5 0 0 0 .49.44h8.56a.5.5 0 0 0 .49-.44L17.75 10ZM9.5 11.5a1.5 1.5 0 1 0 0 3a1.5 1.5 0 0 0 0-3Zm5 0a1.5 1.5 0 1 0 0 3a1.5 1.5 0 0 0 0-3Z"></path>
                        </svg>
                    </button>

                    <button id="newChatIconButton" class="topbar-icon-button" type="button" aria-label="New chat">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M15.06 3.94a2.5 2.5 0 0 1 3.54 3.54l-8.9 8.9-4.24.7.7-4.24 8.9-8.9ZM14 5l-7.16 7.16-.32 1.92 1.92-.32L15.36 6.84 14 5Zm-2 13h8v2H4v-8h2v6h6Z"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <section class="chat-stage">
                <div class="chat-content">
                    <section id="welcomeScreen" class="welcome-screen">
                        <div id="zoraOrb" class="zora-orb">
                            <div class="orb-eyes">
                                <span class="orb-eye"></span>
                                <span class="orb-eye"></span>
                            </div>
                        </div>
                        <h1 id="welcomeLineOne" class="welcome-title">Good Evening, [USER]!</h1>
                        <h1 class="welcome-title">Can I assist you today?</h1>
                    </section>

                    <section class="message-screen">
                        <div class="message-screen-inner" id="messageScroller">
                            <div id="messageList" class="message-list"></div>
                            <div id="typingIndicator" class="typing-indicator hidden">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="chat-panels">
                    <div class="composer-card">
                        <textarea
                            id="chatInput"
                            class="chat-textarea"
                            rows="1"
                            placeholder="Message Zora..."
                        ></textarea>

                        <div class="composer-row">
                            <div class="composer-row-left">
                                <button id="attachButton" class="icon-button" type="button" aria-label="Attach file">
                                    <svg viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M17.5 6.5v8.75a5.25 5.25 0 1 1-10.5 0V5.75a3.75 3.75 0 1 1 7.5 0V14a2.25 2.25 0 1 1-4.5 0V7.5h2V14a.25.25 0 1 0 .5 0V5.75a1.75 1.75 0 0 0-3.5 0v9.5a3.25 3.25 0 1 0 6.5 0V6.5h2Z"></path>
                                    </svg>
                                </button>

                                <div class="toggle-group">
                                    <button id="extendedToggle" class="toggle-switch" type="button" aria-label="Toggle extended mode"></button>
                                    <span class="toggle-label">Extended</span>
                                </div>
                            </div>

                            <div class="composer-row-right">
                                <button id="voiceButton" class="icon-button" type="button" aria-label="Voice input">
                                    <svg viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Zm5-3a1 1 0 1 1 2 0a7 7 0 0 1-6 6.93V21h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-2.07A7 7 0 0 1 5 12a1 1 0 1 1 2 0a5 5 0 0 0 10 0Z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="suggestion-row" id="suggestionRow">
                        <button class="suggestion-card" type="button" data-suggestion="Smart Budget">
                            <h3>Smart Budget</h3>
                            <p>A budget that fits your lifestyle, not the other way around.</p>
                        </button>

                        <button class="suggestion-card" type="button" data-suggestion="Analytics">
                            <h3>Analytics</h3>
                            <p>Analytics empowers individuals and businesses to make smarter decisions.</p>
                        </button>

                        <button class="suggestion-card" type="button" data-suggestion="Spending">
                            <h3>Spending</h3>
                            <p>Spending is the way individuals and businesses use their financial resources.</p>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
