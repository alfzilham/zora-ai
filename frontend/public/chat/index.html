<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZORA AI SuperIntelligence Autonomous AI">
    <meta name="theme-color" content="#00D4FF">
    <meta property="og:title" content="ZORA AI">
    <meta property="og:description" content="SuperIntelligence Autonomous AI">
    <meta property="og:image" content="/assets/images/logo/logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <title>ZORA Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/chat.css">
    <link rel="stylesheet" href="/css/settings.css">
</head>
<body>
    <div class="chat-app" id="chatApp">
        <aside class="chat-sidebar" id="chatSidebar">
            <div class="sidebar-top">
                <label class="sidebar-search">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M10.5 4a6.5 6.5 0 1 0 4.088 11.555l4.428 4.429 1.414-1.414-4.429-4.428A6.5 6.5 0 0 0 10.5 4Zm0 2a4.5 4.5 0 1 1 0 9a4.5 4.5 0 0 1 0-9Z"></path>
                    </svg>
                    <input id="historySearch" type="search" placeholder="Cari percakapan">
                </label>
            </div>

            <div class="sidebar-history">
                <div class="sidebar-section-head">
                    <p class="sidebar-section-title">Percakapan</p>
                    <span class="sidebar-section-count">Live</span>
                </div>
                <div id="conversationList" class="conversation-list"></div>
            </div>

            <div class="sidebar-bottom">
                <button id="newChatButton" class="sidebar-primary-button" type="button">
                    <span class="sidebar-primary-icon">+</span>
                    <span>Mulai Percakapan Baru</span>
                </button>
            </div>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <div class="chat-brand">
                    <img class="chat-brand-logo" src="/assets/images/logo/logo.png" alt="ZORA AI logo" loading="lazy">
                    <div>
                        <p class="chat-brand-kicker">Superintelligence Autonomous AI</p>
                        <h1 class="chat-brand-title">ZORA <span>AI</span></h1>
                        <p id="chatTitle" class="chat-title-line">New Chat</p>
                    </div>
                </div>

                <div class="chat-header-actions">
                    <button id="openSettingsButton" class="header-icon-button" type="button" aria-label="Settings">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.1 7.1 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 13.9 2h-3.8a.5.5 0 0 0-.49.42l-.36 2.54c-.58.22-1.12.53-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.48a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.4 1.05.72 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.8a.5.5 0 0 0 .49-.42l.36-2.54c.58-.22 1.12-.53 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"></path>
                        </svg>
                    </button>

                    <div class="header-user">
                    <div class="header-user-copy">
                        <span class="header-user-label">You</span>
                        <strong id="profileName">Loading...</strong>
                        <span id="profileEmail" class="header-user-email"></span>
                    </div>
                        <div id="profileAvatar" class="header-user-avatar">Z</div>
                    </div>
                </div>
            </header>

            <section id="chatFeed" class="chat-feed">
                <div id="emptyState" class="empty-state">
                    <p class="empty-kicker">Welcome to the orbit</p>
                    <h2 id="emptyGreeting">What shall we do, there?</h2>
                    <p class="empty-copy">Buka ide baru, riset cepat, breakdown strategi, atau bangun sesuatu yang terasa lebih tajam bersama ZORA.</p>

                    <div class="suggestion-grid">
                        <button class="suggestion-card" data-prompt="Bantu saya menyusun rencana kerja hari ini dengan prioritas yang jelas.">
                            <span class="suggestion-icon">🛰️</span>
                            <span class="suggestion-title">Rancang Prioritas</span>
                            <span class="suggestion-text">Susun agenda yang fokus dan realistis.</span>
                        </button>

                        <button class="suggestion-card" data-prompt="Tolong debug fungsi JavaScript ini dan jelaskan akar bug-nya.">
                            <span class="suggestion-icon">⚙️</span>
                            <span class="suggestion-title">Debug Cepat</span>
                            <span class="suggestion-text">Temukan bug dan jelaskan penyebabnya.</span>
                        </button>

                        <button class="suggestion-card suggestion-card--center" data-prompt="Berikan strategi kreatif yang berani untuk brand teknologi baru saya.">
                            <span class="suggestion-icon">🌌</span>
                            <span class="suggestion-title">Strategi Besar</span>
                            <span class="suggestion-text">Cari arah yang lebih berani, tajam, dan memorable.</span>
                        </button>

                        <button class="suggestion-card" data-prompt="Riset tren AI terbaru minggu ini dan ringkas insight paling penting.">
                            <span class="suggestion-icon">📡</span>
                            <span class="suggestion-title">Riset Tren</span>
                            <span class="suggestion-text">Ringkasan insight yang relevan dan actionable.</span>
                        </button>

                        <button class="suggestion-card" data-prompt="Tulis 3 headline landing page yang terasa premium untuk startup saya.">
                            <span class="suggestion-icon">✨</span>
                            <span class="suggestion-title">Tulis Headline</span>
                            <span class="suggestion-text">Craft copy yang ringkas dan berkarakter.</span>
                        </button>
                    </div>
                </div>

                <div id="messageList" class="message-list"></div>

                <div id="typingIndicator" class="typing-indicator hidden">
                    <div class="typing-avatar">
                        <img src="/assets/images/logo/logo.png" alt="ZORA AI logo" loading="lazy">
                    </div>
                    <div class="typing-body">
                        <p class="message-author">AI Zora</p>
                        <div class="typing-bubble">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </div>
            </section>

            <footer class="chat-composer-shell">
                <form id="composerForm" class="chat-composer">
                    <button id="voiceButton" class="composer-icon-button composer-icon-button--left" type="button" aria-label="Voice note">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Zm5-3a1 1 0 1 1 2 0a7 7 0 0 1-6 6.93V21h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-2.07A7 7 0 0 1 5 12a1 1 0 1 1 2 0a5 5 0 0 0 10 0Z"></path>
                        </svg>
                    </button>

                    <textarea
                        id="chatInput"
                        class="chat-input"
                        rows="1"
                        placeholder="Ketik pesan untuk ZORA..."
                    ></textarea>

                    <div class="composer-actions">
                        <button id="extendedThinkingButton" class="composer-toggle" type="button">Extended Thinking</button>
                        <button id="incognitoButton" class="composer-toggle" type="button">Incognito</button>
                        <button class="composer-icon-button" type="button" aria-label="Add attachment">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 5a1 1 0 0 1 1 1v5h5a1 1 0 1 1 0 2h-5v5a1 1 0 1 1-2 0v-5H6a1 1 0 1 1 0-2h5V6a1 1 0 0 1 1-1Z"></path>
                            </svg>
                        </button>
                        <button id="sendButton" class="send-button" type="submit" aria-label="Send">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M3.4 20.4 21 12 3.4 3.6 3 10l12 2-12 2 .4 6.4Z"></path>
                            </svg>
                        </button>
                    </div>
                </form>
                <p id="composerStatus" class="composer-status"></p>
            </footer>
        </main>
    </div>

    <div id="settingsOverlay" class="settings-overlay" aria-hidden="true">
        <section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <header class="settings-header">
                <div>
                    <p class="settings-kicker">ZORA SETTINGS</p>
                    <h2 id="settingsTitle">Workspace Preferences</h2>
                </div>
                <button id="closeSettingsButton" class="settings-close" type="button" aria-label="Close settings">×</button>
            </header>

            <div class="settings-content" id="settingsContent"></div>
        </section>
    </div>

    <script defer src="/js/utils/helpers.js"></script>
    <script defer src="/js/utils/api.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/chat.js"></script>
    <script defer src="/js/settings.js"></script>
</body>
</html>
