<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZORA AI SuperIntelligence Autonomous AI">
    <meta name="theme-color" content="#00D4FF">
    <meta property="og:title" content="ZORA AI">
    <meta property="og:description" content="SuperIntelligence Autonomous AI">
    <meta property="og:image" content="/assets/images/logo/logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <title>ZORA Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/chat.css">
    <script src="https://cdn.jsdelivr.net/npm/ogl@1.0.9/src/index.js" type="module" id="oglScript"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script defer src="/js/utils/helpers.js"></script>
    <script defer src="/js/utils/api.js"></script>
    <script defer src="/js/chat.js"></script>
</head>

<body>
    <div class="chat-shell" id="chatShell">
        <aside class="chat-sidebar sidebar" id="sidebar">
            <div class="sidebar-content">
                <div class="sidebar-header">
                    <div class="sidebar-brand sidebar-logo">
                        <img src="/assets/images/logo/logo.png" class="sidebar-logo-icon" alt="ZORA AI logo"
                            loading="lazy">
                        <span class="sidebar-logo-text sidebar-brand-name">ZORA AI</span>
                    </div>
                    <button id="sidebar-toggle" class="sidebar-toggle-btn" type="button" title="Toggle Sidebar">
                        <i class="fi fi-rr-sidebar"></i>
                    </button>
                </div>

                <nav class="sidebar-nav" aria-label="Primary">
                    <a class="sidebar-link nav-item active" href="#" title="Home">
                        <span class="nav-icon"><i class="fi fi-rr-house-chimney"></i></span>
                        <span class="nav-label">Home</span>
                    </a>
                    <a class="sidebar-link nav-item" href="#" title="Search" id="searchNavItem">
                        <span class="nav-icon"><i class="fi fi-rr-search"></i></span>
                        <span class="nav-label">Search</span>
                    </a>
                    <a class="sidebar-link nav-item" href="#" title="History">
                        <span class="nav-icon"><i class="fi fi-rs-pending"></i></span>
                        <span class="nav-label">History</span>
                    </a>
                    <a class="sidebar-link nav-item" href="/labs/code.html" title="Code">
                        <span class="nav-icon"><i class="fi fi-rr-terminal"></i></span>
                        <span class="nav-label">Code</span>
                    </a>
                    <a class="sidebar-link nav-item" href="/labs/research.html" title="Labs">
                        <span class="nav-icon"><i class="fi fi-rr-flask-potion"></i></span>
                        <span class="nav-label">Labs</span>
                    </a>
                    <a class="sidebar-link nav-item" href="/settings/index.html" title="FeedBack">
                        <span class="nav-icon"><i class="fi fi-rs-comments"></i></span>
                        <span class="nav-label">FeedBack</span>
                    </a>
                </nav>

                <div class="sidebar-divider"></div>

                <section class="sidebar-history chat-history-section">
                    <h2>Chat History</h2>
                    <div id="historyScroll" class="history-scroll">
                        <div id="conversationList"></div>
                    </div>
                </section>

                <div class="sidebar-divider"></div>

                <div class="user-profile-section">
                    <div id="settings-dropdown" class="settings-dropdown">
                        <div id="settingsDropdownEmail" class="settings-dropdown-email"></div>
                        <div class="settings-divider"></div>
                        <div class="settings-action-btn logout-btn" id="logout-button">
                            <i class="fi fi-br-sign-out-alt"></i>
                            <span>Log out</span>
                        </div>
                    </div>

                    <div class="sidebar-user">
                        <div id="profileAvatar" class="sidebar-user-avatar">Z</div>
                        <div class="sidebar-user-info">
                            <p id="profileName" class="sidebar-user-name">Loading...</p>
                            <p id="profileEmail" class="sidebar-user-email"></p>
                        </div>
                        <button id="settings-gear" class="sidebar-settings-link" type="button"
                            aria-label="Open settings">
                            <i class="fi fi-br-settings"></i>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="chat-main">
            <header class="chat-topbar">
                <button id="chatTitleButton" class="chat-title-button" type="button">
                    <span id="chatTitle">Chat Title</span>
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7.41 8.59 12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41Z"></path>
                    </svg>
                </button>

                <div class="topbar-actions">
                    <button id="incognitoButton" class="topbar-icon-button" type="button" aria-label="Incognito mode">
                        <i class="fi fi-rr-incognito"></i>
                    </button>
                    <button id="newChatIconButton" class="topbar-icon-button" type="button" aria-label="New chat">
                        <i class="fi fi-rs-comment-medical"></i>
                    </button>
                </div>
            </header>

            <section class="chat-stage">
                <div class="chat-content">
                    <section id="welcomeScreen" class="welcome-screen">
                        <div id="zoraOrb" class="zora-orb">
                            <div id="orbCanvas" class="orb-canvas-container"></div>
                            <div class="orb-eyes">
                                <span class="orb-eye"></span>
                                <span class="orb-eye"></span>
                            </div>
                        </div>
                        <h1 id="welcomeLineOne" class="welcome-title split-text"></h1>
                        <h1 id="welcomeLineTwo" class="welcome-title split-text"></h1>
                    </section>

                    <section class="message-screen">
                        <div class="message-screen-inner" id="messageScroller">
                            <div id="messageList" class="message-list"></div>
                            <div id="typingIndicator" class="typing-indicator hidden">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="chat-panels">
                    <div class="composer-card">
                        <textarea id="chatInput" class="chat-textarea" rows="1"
                            placeholder="Message Zora..."></textarea>

                        <div class="composer-row">
                            <div class="composer-row-left">
                                <button id="attachButton" class="icon-button" type="button" aria-label="Attach file">
                                    <i class="fi fi-rr-clip"></i>
                                </button>
                                <div class="toggle-group">
                                    <button id="extendedToggle" class="toggle-switch" type="button"
                                        aria-label="Toggle extended mode"></button>
                                    <span class="toggle-label">Extended</span>
                                </div>
                            </div>

                            <div class="composer-row-right">
                                <button id="voiceButton" class="icon-button" type="button" aria-label="Voice input">
                                    <i class="fi fi-rr-microphone"></i>
                                </button>
                                <button id="sendButton" class="icon-button send-btn" type="button"
                                    aria-label="Send message">
                                    <i class="fi fi-rs-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Archive Confirmation Lightbox -->
    <div id="archiveLightbox" class="lightbox-overlay hidden">
        <div class="lightbox-card">
            <div class="lightbox-icon"><i class="fi fi-rr-trash"></i></div>
            <h3 class="lightbox-title">Archive this chat?</h3>
            <p class="lightbox-desc">This chat will be removed from your history.</p>
            <div class="lightbox-actions">
                <button id="archiveCancelBtn" class="lightbox-btn lightbox-btn-cancel">Cancel</button>
                <button id="archiveConfirmBtn" class="lightbox-btn lightbox-btn-confirm">Archive</button>
            </div>
        </div>
    </div>

    <!-- Rename Confirmation Lightbox -->
    <div id="renameLightbox" class="lightbox-overlay hidden">
        <div class="lightbox-card">
            <div class="lightbox-icon" style="color:#0099CC"><i class="fi fi-ss-pencil"></i></div>
            <h3 class="lightbox-title">Rename chat</h3>
            <input id="renameInput" class="lightbox-input" type="text" placeholder="Enter new name...">
            <div class="lightbox-actions">
                <button id="renameCancelBtn" class="lightbox-btn lightbox-btn-cancel">Cancel</button>
                <button id="renameConfirmBtn" class="lightbox-btn lightbox-btn-rename">Rename</button>
            </div>
        </div>
    </div>
</body>

</html>
