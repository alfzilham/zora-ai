<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZORA AI Developer Dashboard">
    <meta name="theme-color" content="#00D4FF">
    <link rel="icon" href="/favicon.ico">
    <title>Developer Dashboard - ZORA AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-straight/css/uicons-solid-straight.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<main class="dashboard-shell">

    <!-- Header -->
    <header class="dashboard-header">
        <div class="dashboard-brand">
            <div class="dashboard-brand-logo">
                <img src="/assets/images/logo/logo.png" alt="ZORA AI">
            </div>
            <div class="dashboard-brand-info">
                <p class="dashboard-kicker">ZORA AI</p>
                <h1>Developer Dashboard</h1>
            </div>
        </div>
        <div class="dashboard-header-right">
            <p id="dashboardStatus" class="dashboard-status"></p>
            <button id="dashboardLogoutButton" class="dashboard-logout" type="button">
                <i class="fi fi-rr-sign-out-alt"></i>
                Logout
            </button>
        </div>
    </header>

    <!-- Stats -->
    <section class="stats-grid">
        <article class="stat-card">
            <div class="stat-card-header">
                <p class="stat-label">Total Users</p>
                <div class="stat-icon-wrap cyan"><i class="fi fi-rr-users"></i></div>
            </div>
            <div class="stat-value-row">
                <strong id="totalUsersValue">0</strong>
            </div>
        </article>
        <article class="stat-card">
            <div class="stat-card-header">
                <p class="stat-label">Total Earnings</p>
                <div class="stat-icon-wrap green"><i class="fi fi-rr-wallet"></i></div>
            </div>
            <div class="stat-value-row">
                <strong id="totalEarningsValue">Rp0</strong>
            </div>
        </article>
        <article class="stat-card">
            <div class="stat-card-header">
                <p class="stat-label">Users This Month</p>
                <div class="stat-icon-wrap purple"><i class="fi fi-rr-chart-line-up"></i></div>
            </div>
            <div class="stat-value-row">
                <strong id="usersThisMonthValue">0</strong>
            </div>
        </article>
        <article class="stat-card">
            <div class="stat-card-header">
                <p class="stat-label">Users This Year</p>
                <div class="stat-icon-wrap amber"><i class="fi fi-rr-calendar"></i></div>
            </div>
            <div class="stat-value-row">
                <strong id="usersThisYearValue">0</strong>
            </div>
        </article>
    </section>

    <!-- Charts + Countries -->
    <section class="dashboard-grid">
        <article class="dashboard-panel">
            <div class="panel-heading">
                <div>
                    <p class="panel-kicker">Growth</p>
                    <h2>Users per Month</h2>
                </div>
            </div>
            <div class="chart-shell">
                <canvas id="usersByMonthChart"></canvas>
            </div>
        </article>
        <article class="dashboard-panel">
            <div class="panel-heading">
                <div>
                    <p class="panel-kicker">Geography</p>
                    <h2>Top Countries</h2>
                </div>
            </div>
            <div class="table-shell">
                <table class="dashboard-table">
                    <thead>
                        <tr>
                            <th>Country</th>
                            <th>Users</th>
                        </tr>
                    </thead>
                    <tbody id="countriesTableBody"></tbody>
                </table>
            </div>
        </article>
    </section>

    <!-- Recent Signups + Withdraw -->
    <section class="dashboard-grid dashboard-grid--bottom">
        <article class="dashboard-panel">
            <div class="panel-heading">
                <div>
                    <p class="panel-kicker">Recent Activity</p>
                    <h2>Recent Signups</h2>
                </div>
            </div>
            <div class="table-shell">
                <table class="dashboard-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Country</th>
                            <th>Joined</th>
                        </tr>
                    </thead>
                    <tbody id="recentSignupsBody"></tbody>
                </table>
            </div>
        </article>
        <article class="dashboard-panel">
            <div class="panel-heading">
                <div>
                    <p class="panel-kicker">Monetization</p>
                    <h2>Withdraw Earnings</h2>
                </div>
            </div>
            <form id="withdrawForm" class="withdraw-form">
                <label class="withdraw-field">
                    <span>Amount (Rp)</span>
                    <input id="withdrawAmount" type="number" min="1" placeholder="1000000" required>
                </label>
                <label class="withdraw-field">
                    <span>Bank Code</span>
                    <input id="withdrawBankCode" type="text" placeholder="BCA / BNI / BRI" required>
                </label>
                <label class="withdraw-field">
                    <span>Account Number</span>
                    <input id="withdrawAccountNumber" type="text" placeholder="1234567890" required>
                </label>
                <label class="withdraw-field">
                    <span>Account Holder Name</span>
                    <input id="withdrawAccountHolderName" type="text" placeholder="Your Full Name" required>
                </label>
                <button class="withdraw-button" type="submit">Withdraw Funds</button>
                <p id="withdrawStatus" class="withdraw-status"></p>
            </form>
        </article>
    </section>

</main>

<script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script defer src="/js/utils/helpers.js"></script>
<script defer src="/js/utils/api.js"></script>
<script defer src="/js/auth.js"></script>
<script defer src="/js/dashboard.js"></script>
</body>
</html>
