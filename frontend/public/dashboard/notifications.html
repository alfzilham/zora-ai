<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        // Session guard — redirect to dashboard if not unlocked
        (function () {
            if (sessionStorage.getItem('zora_dashboard_unlocked') !== '1') {
                window.location.replace('/dashboard/index.html');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - ZORA AI</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link rel="stylesheet"
        href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-straight/css/uicons-solid-straight.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/notifications.css">
</head>

<body>
    <div class="db-app">

        <!-- Sidebar -->
                        <aside class="db-sidebar">
            <div class="db-sidebar-brand">
                <img src="/assets/images/logo/logo.png" alt="ZORA AI" class="db-sidebar-logo">
                <span class="db-sidebar-name">ZORA AI</span>
            </div>
            <nav class="db-sidebar-nav">
                <a href="/dashboard/index.html" class="db-nav-item" data-page="index">
                    <i class="fi fi-rr-chart-pie-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/dashboard/users.html" class="db-nav-item" data-page="users">
                    <i class="fi fi-rr-users"></i>
                    <span>Users</span>
                </a>
                <a href="/dashboard/feedback-admin.html" class="db-nav-item" data-page="feedback-admin">
                    <i class="fi fi-rr-comment-alt"></i>
                    <span>Feedback</span>
                </a>
                <a href="/dashboard/analytics.html" class="db-nav-item" data-page="analytics">
                    <i class="fi fi-rr-chart-line-up"></i>
                    <span>Analytics</span>
                </a>
                <a href="/dashboard/earnings.html" class="db-nav-item" data-page="earnings">
                    <i class="fi fi-rr-wallet"></i>
                    <span>Earnings</span>
                </a>
                <a href="/dashboard/trade-history.html" class="db-nav-item" data-page="trade-history">
                    <i class="fi fi-rr-coins"></i>
                    <span>Trade History</span>
                </a>
                <a href="/dashboard/notifications.html" class="db-nav-item" data-page="notifications">
                    <i class="fi fi-rr-bell"></i>
                    <span>Notifications</span>
                </a>
                <a href="/dashboard/settings.html" class="db-nav-item" data-page="settings">
                    <i class="fi fi-rr-settings"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="db-sidebar-footer">
                <a href="/chat/index.html" class="db-back-chat">
                    <i class="fi fi-rr-arrow-left"></i>
                    <span>Back to Chat</span>
                </a>
                <button class="db-logout-btn db-logout-trigger" type="button">
                    <i class="fi fi-rr-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main -->
        <main class="db-main">

            <!-- Topbar -->
            <header class="notif-topbar">
    <script>
        // Session guard — redirect to dashboard if not unlocked
        (function () {
            if (sessionStorage.getItem('zora_dashboard_unlocked') !== '1') {
                window.location.replace('/dashboard/index.html');
            }
        })();
    </script>
                <div class="notif-topbar-left">
                    <h1 class="db-page-title">Notifications</h1>
                    <p class="notif-subtitle">Stay updated on user activity and system events</p>
                </div>
                <div class="notif-topbar-right">
                    <button class="db-pill-btn" id="markAllBtn">
                        <i class="fi fi-rr-check-double"></i>
                        Mark all as read
                    </button>
                    <button class="db-pill-btn" id="clearAllBtn">
                        <i class="fi fi-rr-trash"></i>
                        Clear all
                    </button>
                </div>
            </header>

            <!-- Filter Bar -->
            <div class="notif-filter-bar">
                <button class="notif-filter-btn active" data-filter="all">All</button>
                <button class="notif-filter-btn" data-filter="today">Today</button>
                <button class="notif-filter-btn" data-filter="yesterday">Yesterday</button>
                <button class="notif-filter-btn" data-filter="week">This Week</button>
                <button class="notif-filter-btn" data-filter="month">This Month</button>
                <button class="notif-filter-btn" data-filter="unread">Unread</button>

                <div class="notif-filter-right">
                    <span id="notifCount" class="notif-count-label">0 notifications</span>
                </div>
            </div>

            <!-- Notification List -->
            <div class="notif-content">
                <div id="notifGroups" class="notif-groups">
                    <div class="notif-loading">
                        <i class="fi fi-rr-loading notif-spin"></i>
                        Loading notifications...
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script defer src="/js/utils/helpers.js"></script>
    <script defer src="/js/utils/api.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/notifications.js"></script>
    <script>
        // Set active nav item based on current page
        (function () {
            const currentPage = window.location.pathname.split('/').pop().replace('.html', '');
            document.querySelectorAll('.db-nav-item[data-page]').forEach(item => {
                if (item.dataset.page === currentPage) {
                    item.classList.add('active');
                }
            });
            // Logout handler
            document.querySelectorAll('.db-logout-trigger').forEach(btn => {
                btn.addEventListener('click', () => {
                    localStorage.removeItem('zora_token');
                    sessionStorage.removeItem('zora_dashboard_unlocked');
                    window.location.href = '/auth/login.html';
                });
            });
        })();
    </script>
</body>

</html>
