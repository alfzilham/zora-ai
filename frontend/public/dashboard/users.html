<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        // Session guard — redirect to dashboard if not unlocked
        (function () {
            if (sessionStorage.getItem('zora_dashboard_unlocked') !== '1') {
                window.location.replace('/dashboard/index.html');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - ZORA AI</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link rel="stylesheet"
        href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-straight/css/uicons-solid-straight.css">
    <link rel="stylesheet" href="/css/dashboard.css">

    <style>
        /* ── PAGE LOADER ─────────────────────────────────────── */
        #pageLoader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #0d0d12;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.35s ease;
            pointer-events: all;
        }

        #pageLoader.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #pageLoader.hidden {
            display: none;
        }

        .zora-spinner {
            position: relative;
            border-radius: 50%;
            height: 80px;
            width: 80px;
            animation: rotate_3922 1.2s linear infinite;
            background-image: linear-gradient(#00D4FF, #0088ff, #00e5a0);
        }

        .zora-spinner span {
            position: absolute;
            border-radius: 50%;
            height: 100%;
            width: 100%;
            background-image: linear-gradient(#00D4FF, #0088ff, #00e5a0);
        }

        .zora-spinner span:nth-of-type(1) {
            filter: blur(5px);
        }

        .zora-spinner span:nth-of-type(2) {
            filter: blur(10px);
        }

        .zora-spinner span:nth-of-type(3) {
            filter: blur(25px);
        }

        .zora-spinner span:nth-of-type(4) {
            filter: blur(50px);
        }

        .zora-spinner::after {
            content: "";
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            background-color: #0d0d12;
            border: solid 4px #0d0d12;
            border-radius: 50%;
        }

        @keyframes rotate_3922 {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* ── TOPBAR ──────────────────────────────────────────── */
        .users-topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding: 24px 28px 0;
            flex-shrink: 0;
        }

        .users-topbar-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .users-subtitle {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.3);
            margin: 0;
        }

        .users-topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 6px;
        }

        /* ── SUMMARY CARDS ───────────────────────────────────── */
        .users-summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            padding: 20px 28px 0;
        }

        .users-stat {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 18px 20px;
        }

        .users-stat-label {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            margin-bottom: 8px;
        }

        .users-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .users-stat-value.cyan {
            color: #00D4FF;
        }

        .users-stat-value.green {
            color: #00e5a0;
        }

        .users-stat-value.purple {
            color: #a78bfa;
        }

        /* ── SEARCH + FILTER BAR ─────────────────────────────── */
        .users-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 28px 0;
        }

        .users-search-wrap {
            position: relative;
            flex: 1;
            max-width: 360px;
        }

        .users-search-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .users-search {
            width: 100%;
            height: 36px;
            padding: 0 14px 0 36px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font: inherit;
            font-size: 0.82rem;
            outline: none;
            transition: border-color 0.15s;
            box-sizing: border-box;
        }

        .users-search:focus {
            border-color: rgba(0, 212, 255, 0.35);
        }

        .users-search::placeholder {
            color: rgba(255, 255, 255, 0.18);
        }

        .users-filter-btn {
            height: 36px;
            padding: 0 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: transparent;
            color: rgba(255, 255, 255, 0.35);
            font: inherit;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .users-filter-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
        }

        .users-filter-btn.active {
            background: rgba(0, 212, 255, 0.12);
            border-color: rgba(0, 212, 255, 0.3);
            color: #00D4FF;
            font-weight: 600;
        }

        .users-count {
            margin-left: auto;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
        }

        /* ── CONTENT ─────────────────────────────────────────── */
        .users-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 28px 32px;
        }

        .users-content::-webkit-scrollbar {
            width: 4px;
        }

        .users-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
        }

        /* ── TABLE PANEL ─────────────────────────────────────── */
        .users-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            overflow: hidden;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        .users-table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.22);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.01);
        }

        .users-table td {
            padding: 13px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.45);
        }

        .users-table tbody tr:last-child td {
            border-bottom: none;
        }

        .users-table tbody tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Avatar + Name cell */
        .user-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00D4FF, #0088ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 700;
            color: #020f1a;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .user-name {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        .user-email {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.25);
        }

        /* Country flag */
        .user-country {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.45);
        }

        /* Status badge */
        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 999px;
        }

        .user-badge::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .user-badge.active {
            background: rgba(0, 229, 160, 0.1);
            color: #00e5a0;
        }

        .user-badge.active::before {
            background: #00e5a0;
        }

        /* No # column */
        .users-table td.num {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
        }

        /* ── EMPTY STATE ─────────────────────────────────────── */
        .users-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 80px 24px;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
        }

        .users-empty i {
            font-size: 2.5rem;
            opacity: 0.3;
        }

        .users-empty p {
            font-size: 0.875rem;
            margin: 0;
        }

        /* ── LOADING ─────────────────────────────────────────── */
        .users-loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
            padding: 60px 24px;
            justify-content: center;
        }

        .spin {
            animation: spinAnim 1s linear infinite;
        }

        @keyframes spinAnim {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── RESPONSIVE ──────────────────────────────────────── */
        @media (max-width: 768px) {
            .db-sidebar {
                display: none;
            }

            .users-summary {
                grid-template-columns: 1fr;
                padding: 14px 16px 0;
            }

            .users-topbar {
                padding: 16px 16px 0;
                flex-direction: column;
            }

            .users-content {
                padding: 14px 16px 24px;
            }

            .users-controls {
                padding: 12px 16px 0;
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>

    <script defer src="/js/utils/helpers.js"></script>
    <script defer src="/js/utils/api.js"></script>
    <script defer src="/js/auth.js"></script>
    <script>
        // ── PAGE LOADER ────────────────────────────────────────────────────────────
        (function () {
            const loader = document.getElementById('pageLoader');
            window.addEventListener('load', () => {
                if (!loader) return;
                loader.classList.add('fade-out');
                setTimeout(() => loader.classList.add('hidden'), 380);
            });
            document.addEventListener('click', (e) => {
                const link = e.target.closest('a[href]');
                if (!link) return;
                const href = link.getAttribute('href');
                if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
                const dashPages = ['/dashboard/', '/chat/'];
                if (!dashPages.some(p => href.includes(p))) return;
                e.preventDefault();
                if (!loader) { window.location.href = href; return; }
                loader.classList.remove('hidden', 'fade-out');
                setTimeout(() => { window.location.href = href; }, 1500);
            });
        })();

        // ── USERS PAGE ─────────────────────────────────────────────────────────────
        (function () {
            const flagMap = {
                'Indonesia': '🇮🇩', 'United States': '🇺🇸', 'Malaysia': '🇲🇾',
                'Singapore': '🇸🇬', 'Japan': '🇯🇵', 'South Korea': '🇰🇷',
                'Australia': '🇦🇺', 'Germany': '🇩🇪', 'United Kingdom': '🇬🇧',
                'France': '🇫🇷', 'India': '🇮🇳', 'China': '🇨🇳', 'Unknown': '🌐'
            };

            let allUsers = [];
            let currentFilter = 'all';
            let searchQuery = '';

            function getInitials(name) {
                return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
            }

            function getFlag(country) {
                return flagMap[country] || '🌐';
            }

            function formatDate(iso) {
                if (!iso) return '-';
                return new Date(iso).toLocaleDateString('id-ID', {
                    day: '2-digit', month: 'short', year: 'numeric'
                });
            }

            function applyFiltersAndSearch() {
                let filtered = [...allUsers];

                // Country filter
                if (currentFilter === 'indonesia') {
                    filtered = filtered.filter(u => u.country === 'Indonesia');
                } else if (currentFilter === 'unknown') {
                    filtered = filtered.filter(u => !u.country || u.country === 'Unknown');
                }

                // Search
                if (searchQuery.trim()) {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(u =>
                        (u.name || '').toLowerCase().includes(q) ||
                        (u.email || '').toLowerCase().includes(q) ||
                        (u.country || '').toLowerCase().includes(q)
                    );
                }

                return filtered;
            }

            function render() {
                const filtered = applyFiltersAndSearch();
                const loading = document.getElementById('usersLoading');
                const empty = document.getElementById('usersEmpty');
                const table = document.getElementById('usersTable');
                const tbody = document.getElementById('usersTableBody');
                const countEl = document.getElementById('userCount');

                loading.style.display = 'none';
                countEl.textContent = `${filtered.length} user${filtered.length !== 1 ? 's' : ''}`;

                if (!filtered.length) {
                    empty.style.display = '';
                    table.style.display = 'none';
                    return;
                }

                empty.style.display = 'none';
                table.style.display = '';

                tbody.innerHTML = filtered.map((u, i) => `
            <tr>
                <td class="num">${i + 1}</td>
                <td>
                    <div class="user-cell">
                        <div class="user-avatar">${getInitials(u.name)}</div>
                        <div>
                            <div class="user-name">${u.name || '-'}</div>
                            <div class="user-email">${u.email || '-'}</div>
                        </div>
                    </div>
                </td>
                <td>
                    <span class="user-country">
                        ${getFlag(u.country)} ${u.country || 'Unknown'}
                    </span>
                </td>
                <td><span class="user-badge active">Active</span></td>
                <td style="color:rgba(255,255,255,0.3)">${formatDate(u.created_at)}</td>
            </tr>
        `).join('');
            }

            function bindControls() {
                // Filter buttons
                document.querySelectorAll('.users-filter-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.users-filter-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentFilter = btn.dataset.filter;
                        render();
                    });
                });

                // Search
                document.getElementById('userSearch').addEventListener('input', (e) => {
                    searchQuery = e.target.value;
                    render();
                });

                // Logout
                document.getElementById('logoutBtn')?.addEventListener('click', () => {
                    localStorage.removeItem('zora_token');
                    window.location.href = '/auth/login.html';
                });
            }

            async function init() {
                const token = localStorage.getItem('zora_token');
                if (!token) { window.location.href = '/auth/login.html'; return; }

                bindControls();

                try {
                    const res = await apiCall('/dashboard/stats', 'GET', null, true);
                    const data = res?.data || {};

                    // Summary
                    document.getElementById('statTotal').textContent = data.total_users || 0;
                    document.getElementById('statMonth').textContent = data.users_this_month || 0;
                    document.getElementById('statYear').textContent = data.users_this_year || 0;
                    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('id-ID', {
                        hour: '2-digit', minute: '2-digit'
                    });

                    // Users from recent_signups (all of them — up to 10 from backend)
                    allUsers = (data.recent_signups || []).map(u => ({
                        name: u.name,
                        email: u.email,
                        country: u.country,
                        created_at: u.created_at,
                    }));

                    render();

                } catch (err) {
                    document.getElementById('usersLoading').innerHTML =
                        `<span style="color:#ff4d4d">${err.message || 'Failed to load users.'}</span>`;
                }
            }

            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
    <script>
        // Set active nav item based on current page
        (function () {
            const currentPage = window.location.pathname.split('/').pop().replace('.html', '');
            document.querySelectorAll('.db-nav-item[data-page]').forEach(item => {
                if (item.dataset.page === currentPage) {
                    item.classList.add('active');
                }
            });
            // Logout handler
            document.querySelectorAll('.db-logout-trigger').forEach(btn => {
                btn.addEventListener('click', () => {
                    localStorage.removeItem('zora_token');
                    sessionStorage.removeItem('zora_dashboard_unlocked');
                    window.location.href = '/auth/login.html';
                });
            });
        })();
    </script>
</body>

</html>
