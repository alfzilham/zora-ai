<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZORA AI SuperIntelligence Autonomous AI">
    <meta name="theme-color" content="#00D4FF">
    <meta property="og:title" content="ZORA AI">
    <meta property="og:description" content="SuperIntelligence Autonomous AI">
    <meta property="og:image" content="/assets/images/logo/logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <title>ZORA AI</title>
    <style>
        body { min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, rgba(0,212,255,.15), transparent 45%), #0a0a0f; }
        .shell { width: min(560px, calc(100vw - 32px)); padding: 32px; border-radius: 24px; border: 1px solid rgba(255,255,255,.08); background: rgba(18,19,27,.92); box-shadow: 0 18px 48px rgba(0,0,0,.3); text-align: center; }
        .logo { width: 84px; margin: 0 auto 20px; }
        .title { font-size: clamp(2rem, 4vw, 3rem); margin: 0 0 10px; }
        .copy { color: #a0a0b0; margin: 0 0 18px; }
    </style>
</head>
<body>
    <main class="shell">
        <img loading="lazy" class="logo" src="/assets/images/logo/logo.png" alt="ZORA AI logo">
        <h1 class="title">ZORA AI</h1>
        <p class="copy">SuperIntelligence Autonomous AI</p>
        <p class="copy" id="landingStatus">Checking your session...</p>
    </main>

    <script defer src="/js/utils/helpers.js"></script>
    <script defer src="/js/utils/api.js"></script>
    <script defer>
        async function bootstrapLanding() {
            const status = document.getElementById('landingStatus');
            const token = localStorage.getItem('zora_token');
            if (!token) {
                window.location.replace('/auth/login.html');
                return;
            }
            try {
                await apiCall('/auth/me', 'GET', null, true);
                const onboarding = await apiCall('/onboarding/status', 'GET', null, true);
                const nextPage = onboarding?.data?.onboarding_done ? '/chat/index.html' : '/onboarding/name.html';
                window.location.replace(nextPage);
            } catch (error) {
                localStorage.removeItem('zora_token');
                status.textContent = 'Session expired. Redirecting to login...';
                window.location.replace('/auth/login.html');
            }
        }
        document.addEventListener('DOMContentLoaded', bootstrapLanding);
    </script>
</body>
</html>
