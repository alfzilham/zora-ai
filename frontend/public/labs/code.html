<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="ZORA AI SuperIntelligence Autonomous AI">
    <meta name="theme-color" content="#00D4FF">
    <meta property="og:title" content="ZORA AI">
    <meta property="og:description" content="SuperIntelligence Autonomous AI">
    <meta property="og:image" content="/assets/images/logo/logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">`r`n    <title>Zora Code</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">`r`n    <link rel="stylesheet" href="/css/labs.css">
</head>
<body data-lab="code">
    <main class="lab-shell">
        <header class="lab-header">
            <div class="lab-brand">
                <div class="lab-brand-icon">Z</div>
                <div>
                    <p class="lab-kicker">ZORA LABS</p>
                    <h1>Zora Code</h1>
                </div>
            </div>
            <a class="lab-back" href="/chat/index.html">Back to Chat</a>
        </header>

        <section class="lab-layout lab-layout--split">
            <article class="lab-panel">
                <p class="lab-panel-title">Prompt</p>
                <label class="lab-field">
                    <span>Language</span>
                    <select id="codeLanguage" class="lab-select">
                        <option>Python</option>
                        <option>JavaScript</option>
                        <option>TypeScript</option>
                        <option>HTML/CSS</option>
                        <option>SQL</option>
                        <option>Bash</option>
                        <option>Java</option>
                        <option>C++</option>
                        <option>Go</option>
                        <option>Rust</option>
                    </select>
                </label>
                <label class="lab-field">
                    <span>Code task</span>
                    <textarea id="codePrompt" class="lab-textarea" placeholder="Describe the code you want Zora Code to generate or fix..."></textarea>
                </label>
                <div class="lab-actions">
                    <button id="codeGenerateButton" class="lab-button" type="button">Generate</button>
                </div>
                <p id="codeStatus" class="lab-status"></p>
            </article>

            <article class="lab-panel">
                <div class="lab-panel-heading">
                    <p class="lab-panel-title">Output</p>
                    <button id="codeCopyButton" class="lab-secondary-button" type="button">Copy</button>
                </div>
                <div id="codeLoading" class="lab-loading hidden">
                    <div class="lab-spinner"></div>
                    <span>Generating code...</span>
                </div>
                <pre id="codeOutput" class="lab-code-output"><code>// Your generated code will appear here.</code></pre>
                <section class="lab-explanation">
                    <h2>Explanation</h2>
                    <p id="codeExplanation">Zora Code will explain the generated solution here.</p>
                </section>
            </article>
        </section>
    </main>

        <script defer src="/js/utils/helpers.js"></script>
    <script defer src="/js/utils/api.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/labs.js"></script>
</body>
</html>
