<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="ZORA AI SuperIntelligence Autonomous AI">
    <meta name="theme-color" content="#00D4FF">
    <meta property="og:title" content="ZORA AI">
    <meta property="og:description" content="SuperIntelligence Autonomous AI">
    <meta property="og:image" content="/assets/images/logo/logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">`r`n    <title>Zora Image</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">`r`n    <link rel="stylesheet" href="/css/labs.css">
</head>
<body data-lab="image">
    <main class="lab-shell">
        <header class="lab-header">
            <div class="lab-brand">
                <div class="lab-brand-icon">Z</div>
                <div>
                    <p class="lab-kicker">ZORA LABS</p>
                    <h1>Zora Image</h1>
                </div>
            </div>
            <a class="lab-back" href="/chat/index.html">Back to Chat</a>
        </header>

        <section class="lab-layout lab-layout--stack">
            <article class="lab-panel">
                <p class="lab-panel-title">Prompt</p>
                <label class="lab-field">
                    <span>Describe the image</span>
                    <textarea id="imagePrompt" class="lab-textarea" placeholder="Describe the scene, mood, and subject you want to generate..."></textarea>
                </label>
                <div class="style-grid" id="imageStyleGrid">
                    <button class="style-card is-active" type="button" data-style="photorealistic"><span>📷</span><strong>Photorealistic</strong></button>
                    <button class="style-card" type="button" data-style="anime"><span>✨</span><strong>Anime</strong></button>
                    <button class="style-card" type="button" data-style="digital art"><span>🎨</span><strong>Digital Art</strong></button>
                    <button class="style-card" type="button" data-style="oil painting"><span>🖼️</span><strong>Oil Painting</strong></button>
                    <button class="style-card" type="button" data-style="watercolor"><span>💧</span><strong>Watercolor</strong></button>
                    <button class="style-card" type="button" data-style="sketch"><span>✏️</span><strong>Sketch</strong></button>
                    <button class="style-card" type="button" data-style="3D render"><span>🧊</span><strong>3D Render</strong></button>
                    <button class="style-card" type="button" data-style="pixel art"><span>🕹️</span><strong>Pixel Art</strong></button>
                    <button class="style-card" type="button" data-style="cinematic"><span>🎬</span><strong>Cinematic</strong></button>
                </div>
                <div class="lab-actions">
                    <button id="imageGenerateButton" class="lab-button" type="button">Generate Image</button>
                </div>
                <p id="imageStatus" class="lab-status"></p>
            </article>

            <article class="lab-panel">
                <div id="imageLoading" class="image-skeleton hidden">
                    <div class="image-skeleton-frame"></div>
                    <div class="image-skeleton-line"></div>
                    <div class="image-skeleton-line short"></div>
                </div>
                <div id="imageResult" class="image-result hidden">
                    <img loading="lazy" id="generatedImage" class="generated-image" alt="Generated output">
                    <div class="lab-actions">
                        <button id="imageDownloadButton" class="lab-button" type="button">Download</button>
                    </div>
                    <div class="lab-output-card">
                        <h2>Optimized Prompt</h2>
                        <p id="optimizedPrompt">The optimized prompt will appear here.</p>
                    </div>
                </div>
            </article>
        </section>
    </main>

        <script defer src="/js/utils/helpers.js"></script>
    <script defer src="/js/utils/api.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/labs.js"></script>
</body>
</html>
