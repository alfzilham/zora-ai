<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - ZORA AI</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/onboarding.css">
</head>

<body data-page="name">
    <main class="onboarding-shell">

        <!-- LEFT -->
        <div class="ob-left">
            <div class="ob-brand">
                <img src="/assets/images/logo/logo.png" alt="ZORA AI">
                <span class="ob-brand-name">ZORA AI</span>
            </div>

            <div class="ob-progress">
                <div class="ob-progress-dot active"></div>
                <div class="ob-progress-dot"></div>
                <div class="ob-progress-dot"></div>
            </div>

            <p class="ob-step">Step 1 of 3</p>
            <h1 class="ob-title">What should I call you?</h1>
            <p class="ob-desc">I'll use your name to personalize your chat experience and make our conversations feel
                more natural.</p>

            <form id="nameForm">
                <label class="ob-label" for="displayName">Display name</label>
                <input id="displayName" class="ob-input" type="text" placeholder="Type your name here..."
                    maxlength="255" autocomplete="name" autofocus required>
                <p id="nameError" class="ob-error"></p>
                <button id="nameContinue" class="ob-btn" type="submit">
                    Continue <span>→</span>
                </button>
            </form>
        </div>

        <!-- RIGHT -->
        <div class="ob-right">
            <div class="ob-orb-wrap ob-orb-float">
                <div class="ob-orb-canvas" id="nameOrbCanvas"></div>
                <div class="ob-orb-eyes">
                    <span class="ob-orb-eye"></span>
                    <span class="ob-orb-eye"></span>
                </div>
            </div>
            <span class="ob-right-badge">Powered by ZORA Production</span>
            <h2 class="ob-right-title">Hi, I'm ZORA</h2>
            <p class="ob-right-desc">Your autonomous AI that thinks, routes, and responds with precision.</p>
        </div>

    </main>
    <script defer src="/js/utils/helpers.js"></script>
    <script defer src="/js/utils/api.js"></script>
    <script defer src="/js/onboarding.js"></script>
</body>

</html>
