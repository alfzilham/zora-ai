<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Topics - ZORA AI</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/onboarding.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>

<body data-page="topics">
    <main class="onboarding-shell">

        <!-- LEFT -->
        <div class="ob-left">
            <div class="ob-brand">
                <img src="/assets/images/logo/logo.png" alt="ZORA AI">
                <span class="ob-brand-name">ZORA AI</span>
            </div>

            <div class="ob-progress">
                <div class="ob-progress-dot active"></div>
                <div class="ob-progress-dot active"></div>
                <div class="ob-progress-dot"></div>
            </div>

            <p class="ob-step">Step 2 of 3</p>
            <h1 class="ob-title">What are you into?</h1>
            <p class="ob-desc">Pick at least 2 topics so ZORA can personalize suggestions and lab recommendations for
                you.</p>

            <div class="ob-topic-meta">
                <span id="topicCount" class="ob-topic-count">0 selected</span>
                <span>Minimum 2 required</span>
            </div>

            <div class="ob-topic-grid" id="topicGrid">
                <button class="ob-topic-chip" type="button" data-topic="Technology">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-mobile-friendly"></i> Technology
                </button>
                <button class="ob-topic-chip" type="button" data-topic="Science">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-microscope"></i> Science
                </button>
                <button class="ob-topic-chip" type="button" data-topic="Business">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-corporate-alt"></i> Business
                </button>
                <button class="ob-topic-chip" type="button" data-topic="Arts & Design">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-magic-wand"></i> Arts &amp; Design
                </button>
                <button class="ob-topic-chip" type="button" data-topic="Health">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-gynecology"></i> Health
                </button>
                <button class="ob-topic-chip" type="button" data-topic="Education">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-graduation-cap"></i> Education
                </button>
                <button class="ob-topic-chip" type="button" data-topic="Entertainment">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-clapper-open"></i> Entertainment
                </button>
                <button class="ob-topic-chip" type="button" data-topic="Sports">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-gym"></i> Sports
                </button>
                <button class="ob-topic-chip" type="button" data-topic="Travel">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-plane"></i> Travel
                </button>
                <button class="ob-topic-chip" type="button" data-topic="Food">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-hamburger"></i> Food
                </button>
                <button class="ob-topic-chip" type="button" data-topic="Finance">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-chart-histogram"></i> Finance
                </button>
                <button class="ob-topic-chip" type="button" data-topic="Gaming">
                    <span class="topic-check">✓</span> <i class="fi fi-rr-gamepad"></i> Gaming
                </button>
            </div>

            <p id="topicsError" class="ob-error"></p>
            <button id="topicsContinue" class="ob-btn" type="button" disabled>
                Continue <span>→</span>
            </button>
        </div>

        <!-- RIGHT -->
        <div class="ob-right">
            <div class="ob-orb-wrap ob-orb-float">
                <div class="ob-orb-canvas" id="topicsOrbCanvas"></div>
                <div class="ob-orb-eyes">
                    <span class="ob-orb-eye"></span>
                    <span class="ob-orb-eye"></span>
                </div>
            </div>
            <span class="ob-right-badge">Personalizing</span>
            <h2 class="ob-right-title" id="topicsRightTitle">Tell me what you love</h2>
            <p class="ob-right-desc" id="topicsRightDesc">The more you pick, the smarter ZORA gets about your
                preferences.</p>
        </div>

    </main>
    <script defer src="/js/utils/helpers.js"></script>
    <script defer src="/js/utils/api.js"></script>
    <script defer src="/js/onboarding.js"></script>
</body>

</html>
