<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="ZORA AI SuperIntelligence Autonomous AI">
    <meta name="theme-color" content="#00D4FF">
    <meta property="og:title" content="ZORA AI">
    <meta property="og:description" content="SuperIntelligence Autonomous AI">
    <meta property="og:image" content="/assets/images/logo/logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">`r`n    <title>Zora Research</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/global.css">`r`n    <link rel="stylesheet" href="../../css/labs.css">
</head>
<body data-lab="research">
    <main class="lab-shell">
        <header class="lab-header">
            <div class="lab-brand">
                <div class="lab-brand-icon">Z</div>
                <div>
                    <p class="lab-kicker">ZORA LABS</p>
                    <h1>Zora Research</h1>
                </div>
            </div>
            <a class="lab-back" href="../chat/index.html">Back to Chat</a>
        </header>

        <section class="lab-layout lab-layout--stack">
            <article class="lab-panel">
                <p class="lab-panel-title">Prompt</p>
                <label class="lab-field">
                    <span>Research query</span>
                    <textarea id="researchQuery" class="lab-textarea" placeholder="Ask a research question or topic you want to investigate..."></textarea>
                </label>
                <div class="lab-tabs" id="researchDepthTabs">
                    <button class="lab-tab is-active" type="button" data-depth="quick">Quick</button>
                    <button class="lab-tab" type="button" data-depth="standard">Standard</button>
                    <button class="lab-tab" type="button" data-depth="deep">Deep Research</button>
                </div>
                <div class="lab-actions">
                    <button id="researchGenerateButton" class="lab-button" type="button">Research</button>
                </div>
                <p id="researchStatus" class="lab-status"></p>
            </article>

            <article class="lab-panel">
                <div id="researchLoading" class="lab-loading hidden">
                    <div class="lab-spinner"></div>
                    <span>Researching...</span>
                </div>
                <section class="lab-summary-card">
                    <h2>Summary</h2>
                    <p id="researchSummary">Research findings will appear here.</p>
                </section>
                <div id="researchSections" class="lab-accordion"></div>
                <section class="lab-output-card">
                    <h2>Sources</h2>
                    <ul id="researchSources" class="lab-list"></ul>
                </section>
                <section class="lab-output-card">
                    <h2>Further Reading</h2>
                    <ul id="researchFurtherReading" class="lab-list"></ul>
                </section>
            </article>
        </section>
    </main>

        <script defer src="../../js/utils/helpers.js"></script>
    <script defer src="../../js/utils/api.js"></script>
    <script defer src="../../js/auth.js"></script>
    <script defer src="../../js/labs.js"></script>
</body>
</html>
