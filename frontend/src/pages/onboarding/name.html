<body data-page="name">
    <main class="onboarding-shell">
        <section class="onboarding-panel onboarding-panel--name">
            <div class="brand-mark">ZORA</div>
            <p class="eyebrow">PHASE 2 · ONBOARDING</p>
            <h1 class="headline">Hey! What's your name?</h1>
            <p class="subcopy">
                I’ll use it to personalize your chat, labs, and research flow.
            </p>

            <form id="nameForm" class="stack-lg">
                <label class="field-label" for="displayName">Display name</label>
                <input
                    id="displayName"
                    name="displayName"
                    class="text-input"
                    type="text"
                    maxlength="255"
                    placeholder="Type your name here"
                    autocomplete="name"
                    required
                >
                <p id="nameError" class="status-message" role="alert"></p>
                <button id="nameContinue" class="cta-button" type="submit">
                    <span class="button-label">Continue</span>
                    <span class="button-arrow">→</span>
                </button>
            </form>
        </section>
    </main>

        <script defer src="../../js/utils/helpers.js"></script>
    <script defer src="../../js/utils/api.js"></script>
    <script defer src="../../js/auth.js"></script>
    <script defer src="../../js/onboarding.js"></script>
</body>
