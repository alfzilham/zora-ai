<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="ZORA AI SuperIntelligence Autonomous AI">
    <meta name="theme-color" content="#00D4FF">
    <meta property="og:title" content="ZORA AI">
    <meta property="og:description" content="SuperIntelligence Autonomous AI">
    <meta property="og:image" content="/assets/images/logo/logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">`r`n    <title>Your Topics - ZORA AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/global.css">`r`n    <link rel="stylesheet" href="../../css/onboarding.css">
</head>
<body data-page="topics">
    <main class="onboarding-shell">
        <section class="onboarding-panel onboarding-panel--topics">
            <div class="brand-mark">ZORA</div>
            <p class="eyebrow">STEP 2 OF 3</p>
            <h1 class="headline">Pick the things you want more of.</h1>
            <p class="subcopy">
                Choose at least 2 topics so I can tune chat suggestions and lab recommendations.
            </p>

            <div class="topic-toolbar">
                <span id="topicCount" class="topic-count">0 selected</span>
                <span class="topic-hint">Minimum 2 required</span>
            </div>

            <div class="topic-grid" id="topicGrid">
                <button class="topic-chip" type="button" data-topic="Technology">Technology</button>
                <button class="topic-chip" type="button" data-topic="Science">Science</button>
                <button class="topic-chip" type="button" data-topic="Business">Business</button>
                <button class="topic-chip" type="button" data-topic="Arts &amp; Design">Arts &amp; Design</button>
                <button class="topic-chip" type="button" data-topic="Health">Health</button>
                <button class="topic-chip" type="button" data-topic="Education">Education</button>
                <button class="topic-chip" type="button" data-topic="Entertainment">Entertainment</button>
                <button class="topic-chip" type="button" data-topic="Sports">Sports</button>
                <button class="topic-chip" type="button" data-topic="Travel">Travel</button>
                <button class="topic-chip" type="button" data-topic="Food">Food</button>
                <button class="topic-chip" type="button" data-topic="Finance">Finance</button>
                <button class="topic-chip" type="button" data-topic="Gaming">Gaming</button>
            </div>

            <p id="topicsError" class="status-message" role="alert"></p>

            <button id="topicsContinue" class="cta-button" type="button" disabled>
                <span class="button-label">Continue</span>
                <span class="button-arrow">→</span>
            </button>
        </section>
    </main>

        <script defer src="../../js/utils/helpers.js"></script>
    <script defer src="../../js/utils/api.js"></script>
    <script defer src="../../js/auth.js"></script>
    <script defer src="../../js/onboarding.js"></script>
</body>
</html>
